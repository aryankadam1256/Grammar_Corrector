# Grammar Correction System - Docker Compose
# Usage: docker-compose -f src/deployment/docker-compose.yml up

services:
  api:
    build:
      context: ../..
      dockerfile: src/deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=${MODEL_PATH:-facebook/bart-base}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - model-cache:/app/checkpoints
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  model-cache:
